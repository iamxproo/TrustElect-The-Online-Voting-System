# ===============================
# Application
# ===============================
spring.application.name=trustelect-backend
server.port=8080

# ===============================
# MySQL Database
# ===============================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/trustelectdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Sam@2003}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect is auto-detected, no need to set

# ===============================
# JWT Configuration
# ===============================
app.jwt.secret=${JWT_SECRET:TrustElectSecretKey2024VeryLongSecretKeyForJWTTokenGenerationAndValidation}
app.jwt.expiration=86400000
# 86400000 ms = 24 hours

# ===============================
# Spring Mail (Gmail SMTP for OTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=samarthkarale21@gmail.com
spring.mail.password=Sam@2003
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP Expiry in minutes
app.otp.expiry=10

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

# ===============================
# File Upload (Candidate Images)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/candidates

# ===============================
# Logging
# ===============================
logging.level.com.trustelect=DEBUG
logging.level.org.springframework.security=INFO
